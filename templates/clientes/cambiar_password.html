{% extends 'base/base.html' %}

{% block title %}Cambiar Contraseña{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{% url 'clientes:mi_perfil' %}">Mi Perfil</a></li>
<li class="breadcrumb-item active">Cambiar Contraseña</li>
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-body p-4">
                <h5 class="fw-bold mb-4">
                    <i class="bi bi-lock me-2 text-primary"></i>Cambiar Contraseña
                </h5>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña Actual <span class="text-danger">*</span></label>
                        <input type="password" name="password_actual" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nueva Contraseña <span class="text-danger">*</span></label>
                        <input type="password" name="password_nuevo" class="form-control"
                               required minlength="6">
                        <small class="text-muted">Mínimo 6 caracteres</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirmar Nueva Contraseña <span class="text-danger">*</span></label>
                        <input type="password" name="password_confirmar" class="form-control" required>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="{% url 'clientes:mi_perfil' %}" class="btn btn-outline-secondary w-100">
                            Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-lock me-1"></i>Actualizar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
